<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1226"/>
      <stop offset="1" stop-color="#0a0f1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0" stop-color="#123a44" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0a0f1f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#2bb6a6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="flaskClip">
      <path d="M447 250 V446 L268 760 a44 44 0 0 0 38 66 H718 a44 44 0 0 0 38 -66 L577 446 V250 Z"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#glow)"/>

  <!-- liquid fill (clipped to flask) -->
  <g clip-path="url(#flaskClip)">
    <rect x="240" y="592" width="544" height="260" fill="url(#liquid)"/>
    <path d="M240 600 q70 -34 140 0 t140 0 t140 0 t140 0 v260 H240 Z" fill="#7df0dd" opacity="0.35"/>
    <!-- bubbles -->
    <circle cx="430" cy="700" r="30" fill="#fbbf24"/>
    <circle cx="560" cy="740" r="20" fill="#f472b6"/>
    <circle cx="610" cy="672" r="13" fill="#fde68a"/>
    <circle cx="470" cy="772" r="11" fill="#fda4af"/>
  </g>

  <!-- flask outline -->
  <path d="M447 250 V446 L268 760 a44 44 0 0 0 38 66 H718 a44 44 0 0 0 38 -66 L577 446 V250"
        fill="none" stroke="#5eead4" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)" opacity="0.5"/>
  <path d="M447 250 V446 L268 760 a44 44 0 0 0 38 66 H718 a44 44 0 0 0 38 -66 L577 446 V250"
        fill="none" stroke="#5eead4" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- mouth cap -->
  <rect x="424" y="196" width="176" height="46" rx="23" fill="#5eead4"/>
</svg>
